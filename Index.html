.nav-dest:hover{background:#2a2a2a;}
.nav-dest.active{border-left-color:var(--gold);background:#2a2a2a;}
.dest-name{font-size:12px;font-weight:600;}
.dest-dates{font-size:11px;color:var(--muted);}
#sidebar-footer{padding:10px 12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);}
.tab-btn{flex:1;padding:11px 4px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;border-top:2px solid transparent;}
.tab-btn.active{color:var(--gold);border-top-color:var(--gold);}
.tab-btn span{display:block;font-size:16px;margin-bottom:2px;}
.dest-header{background:var(--card);border-radius:10px;padding:16px;margin-bottom:14px;border-left:4px solid var(--gold);}

.dh-meta{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap;}

.dest-budget{margin-top:10px;padding:8px;background:var(--dark);border-radius:6px;font-size:12px;color:var(--green);}
.day-card{background:var(--card);border-radius:10px;margin-bottom:12px;overflow:hidden;}
.day-header{padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);user-select:none;}
.day-header:hover{background:#2c2c2c;}
.day-title{font-weight:700;font-size:14px;color:var(--gold);}
.day-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.day-tag{font-size:11px;color:var(--green);background:rgba(39,174,96,0.12);padding:2px 8px;border-radius:10px;}
.day-chev{color:var(--muted);transition:transform 0.2s;font-size:12px;margin-left:8px;}
.day-card.open .day-chev{transform:rotate(180deg);}
.day-body{padding:12px 14px;display:none;}
.day-card.open .day-body{display:block;}
.activity{margin-bottom:12px;padding:10px 12px;border-radius:8px;background:var(--dark);border-left:3px solid var(--border);}
.activity.must{border-left-color:var(--gold);}
.activity.optional{border-left-color:var(--blue);}
.activity.food{border-left-color:var(--orange);}
.activity.alert{border-left-color:var(--red);}
.activity.morning{border-left-color:#9b59b6;}
.activity.transport{border-left-color:#5dade2;}
.activity.done{opacity:0.45;}
.act-title{font-size:13px;font-weight:600;display:flex;align-items:flex-start;gap:6px;}
.act-icon{font-size:15px;flex-shrink:0;}
.act-desc{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5;}
.act-price{font-size:12px;color:var(--green);margin-top:5px;font-weight:500;}
.act-time{font-size:11px;color:#888;margin-top:3px;}
.act-alert-txt{font-size:11px;color:#e74c3c;margin-top:5px;background:rgba(231,76,60,0.1);padding:4px 8px;border-radius:4px;}
.act-transport{font-size:11px;color:#5dade2;margin-top:5px;line-height:1.5;}
.act-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.act-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;}
.act-btn:hover{border-color:var(--gold);color:var(--gold);}
.done-btn{color:var(--green);border-color:var(--green);}
.done-btn.on{background:var(--green);color:#fff;}
.sec-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;}
.alert-box{background:rgba(192,57,43,0.12);border:1px solid rgba(192,57,43,0.3);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#e74c3c;line-height:1.5;}

.food-where{font-size:12px;color:#5dade2;margin-top:4px;}

.gloss-cn{font-size:20px;color:var(--gold);min-width:40px;}
.gloss-pin{font-size:12px;color:var(--blue);}
.gloss-es{font-size:12px;}

.conv-row label{font-size:12px;color:var(--muted);min-width:40px;}
.conv-result{font-size:18px;font-weight:700;color:var(--gold);padding:6px 0;}
.emerg-btn{display:flex;align-items:center;gap:10px;background:var(--dark);border-radius:8px;padding:10px 12px;margin-bottom:6px;text-decoration:none;}
.e-icon{font-size:22px;}
.e-info{flex:1;}
.e-name{font-size:13px;font-weight:600;color:var(--text);}
.e-num{font-size:12px;color:var(--muted);}
.e-call{font-size:11px;background:var(--red);color:#fff;padding:3px 10px;border-radius:20px;}
.budget-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.budget-row:last-child{border-bottom:none;}
.b-cat{color:var(--muted);}
.b-val{color:var(--green);font-weight:600;}
#topbar{display:flex;align-items:center;background:var(--dark);border-bottom:1px solid var(--border);}
#topbar-title{flex:1;padding:10px 14px;font-size:14px;font-weight:700;color:var(--gold);}
#menu-btn{display:none;background:none;border:none;color:var(--text);font-size:22px;padding:10px 14px;cursor:pointer;}
@media(max-width:600px){
  #sidebar{width:100%;min-width:unset;position:absolute;z-index:100;height:100vh;transform:translateX(-100%);transition:transform 0.25s;}
  #sidebar.open{transform:translateX(0);}
  #menu-btn{display:block!important;}

.dest-hotel{font-size:12px;color:#e8e8e8;margin-top:8px;line-height:1.5;}
.dest-arrive{font-size:11px;color:#5dade2;margin-top:6px;line-height:1.5;background:rgba(41,128,185,0.1);padding:6px 8px;border-radius:6px;}
.dest-action-btns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.dest-btn{padding:7px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;}
.amap-btn{background:#e6a817;color:#111;}
.amap-btn:hover{background:#f0b830;}
.photo-btn{background:#2980b9;color:#fff;}

function mk(tag, cls) { var d = document.createElement(tag); if (cls) d.className = cls; return d; }
function mkdiv(cls) { return mk('div', cls); }
function txt(el, t) { el.textContent = t; return el; }

function isDone(di, dyi, ai) { return (doneActs[di+'_'+dyi]||[]).indexOf(ai) > -1; }
function saveDone() { try { localStorage.setItem('china26', JSON.stringify(doneActs)); } catch(e) {} }

function updateProgress() {
  var done = 0, total = 0;
  for (var di = 0; di < DESTINATIONS.length; di++) {
    var dest = DESTINATIONS[di];
    for (var dyi = 0; dyi < dest.days.length; dyi++) {
      total += dest.days[dyi].activities.length;
      var k = di+'_'+dyi;
      if (doneActs[k]) done += doneActs[k].length;
    }
  }
  var pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
}

function toggleActivity(di, dyi, ai) {
  var k = di+'_'+dyi;
  if (!doneActs[k]) doneActs[k] = [];
  var idx = doneActs[k].indexOf(ai);
  if (idx > -1) doneActs[k].splice(idx,1); else doneActs[k].push(ai);
  saveDone(); renderCurrentTab(); updateProgress();
}

  // Intentar abrir la app
  var iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  document.body.appendChild(iframe);
  
  var timer = setTimeout(function() {
    // Si no abrió la app, abrir web
    window.open(webUrl, '_blank');
    document.body.removeChild(iframe);
  }, 1500);
  
  iframe.onload = function() {
    clearTimeout(timer);
    document.body.removeChild(iframe);
  };
  
  iframe.src = appUrl;
  
  // En iOS el iframe no funciona — usar location directamente
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  if (isIOS) {
    clearTimeout(timer);
    document.body.removeChild(iframe);
    // iOS: intent URI no funciona, usar universal link de Amap
    var iosUrl = 'iosamap://poi/search?keywords=' + encoded + '&dev=0';
    window.location.href = iosUrl;
    setTimeout(function() {
      window.open(webUrl, '_blank');
    }, 1200);
  }
}
function openPhotos(query) {
  window.open('https://www.google.com/search?q='+encodeURIComponent(query)+'&tbm=isch','_blank');
}

function buildActivity(act, di, dyi, ai) {
  var done = isDone(di, dyi, ai);
  var t = act.type||'optional';
  var wrap = mkdiv('activity '+t+(done?' done':''));
  var titleRow = mkdiv('act-title');
  var iconSp = mk('span','act-icon');
  iconSp.textContent = act.icon||{must:'★',food:'♨',transport:'🚌',alert:'⚠',morning:'🌅',optional:'●'}[t]||'●';
  var strong = mk('strong'); strong.textContent = act.title;
  titleRow.appendChild(iconSp); titleRow.appendChild(strong);
  wrap.appendChild(titleRow);
  if (act.desc)      wrap.appendChild(txt(mkdiv('act-desc'), act.desc));
  if (act.time)      wrap.appendChild(txt(mkdiv('act-time'), '⏐ '+act.time));
  if (act.price)     wrap.appendChild(txt(mkdiv('act-price'), '¥ '+act.price));
  if (act.transport) wrap.appendChild(txt(mkdiv('act-transport'), '→ '+act.transport));
  if (act.alert)     wrap.appendChild(txt(mkdiv('act-alert-txt'), '⚠ '+act.alert));
  var btns = mkdiv('act-btns');
  if (act.amap) {
    var ab = mk('button','act-btn');
    ab.textContent = '📍 Amap';
    (function(q){ ab.onclick = function(){ openAmap(q); }; })(act.amap);
    btns.appendChild(ab);
  }
  if (act.book) {
    var bb = mk('button','act-btn');
    bb.textContent = '🎟 Reservar';
    (function(u){ bb.onclick = function(){ window.open(u,'_blank'); }; })(act.book);
    btns.appendChild(bb);
  }
  if (t !== 'alert') {
    var db = mk('button','act-btn done-btn'+(done?' on':''));
    db.textContent = done ? '✓ Hecho' : 'Marcar hecho';
    (function(d,dy,a,b){ b.onclick = function(){ toggleActivity(d,dy,a); }; })(di,dyi,ai,db);
    btns.appendChild(db);
  }
  wrap.appendChild(btns);
  return wrap;
}

function toggleDay(id) { var c = document.getElementById(id); if(c) c.classList.toggle('open'); }

function buildDay(day, di, dyi) {
  var id = 'dc'+di+'_'+dyi;
  var card = mkdiv('day-card'); card.id = id;
  var hdr = mkdiv('day-header');
  hdr.onclick = function(){ toggleDay(id); };
  var left = mkdiv('');
  left.appendChild(txt(mkdiv('day-title'), day.date+' — '+day.title));
  left.appendChild(txt(mkdiv('day-sub'), day.subtitle||''));
  var right = mkdiv(''); right.style.cssText='display:flex;align-items:center;gap:6px;';
  if (day.budget) right.appendChild(txt(mkdiv('day-tag'), day.budget));
  right.appendChild(txt(mkdiv('day-chev'),'▼'));
  hdr.appendChild(left); hdr.appendChild(right); card.appendChild(hdr);
  var body = mkdiv('day-body');
  day.activities.forEach(function(act){
    if (act.type==='alert'){
      var box=mkdiv('alert-box'); var s=mk('strong'); s.textContent='⚠ '+act.title;
      box.appendChild(s);
      if(act.desc) box.appendChild(document.createTextNode(' — '+act.desc));
      body.appendChild(box);
    }
  });
  var lastSec = null;
  day.activities.forEach(function(act,ai){
    if (act.type==='alert') return;
    if (act.section && act.section!==lastSec){ body.appendChild(txt(mkdiv('sec-lbl'),act.section)); lastSec=act.section; }
    body.appendChild(buildActivity(act,di,dyi,ai));
  });
  card.appendChild(body);
  return card;
}

function buildItinerary(dest, di) {
  var frag = document.createDocumentFragment();

  // Cabecera del destino
  var hdr = mkdiv('dest-header');
  var h2 = mk('h2'); h2.textContent = dest.flagEmoji+' '+dest.name;
  hdr.appendChild(h2);

  // Metadatos: fechas, noches
  var meta = mkdiv('dh-meta');
  ['\uD83D\uDCC5 '+dest.dates, '\uD83C\uDF19 '+dest.nights+' noches'].forEach(function(t){
    meta.appendChild(txt(mk('span'),t));
  });
  hdr.appendChild(meta);

  // Hotel con nombre completo
  if (dest.hotelFull || dest.hotel) {
    var hotelDiv = mkdiv('dest-hotel');
    var hotelIcon = mk('span'); hotelIcon.textContent = '\uD83C\uDFE8 ';
    hotelDiv.appendChild(hotelIcon);
    hotelDiv.appendChild(document.createTextNode(dest.hotelFull || dest.hotel));
    hdr.appendChild(hotelDiv);
  }

  // Cómo llegar
  if (dest.howToArrive) {
    var arriveDiv = mkdiv('dest-arrive');
    var arrIcon = mk('span'); arrIcon.textContent = '\uD83D\uDE8C Cómo llegar: ';
    arriveDiv.appendChild(arrIcon);
    arriveDiv.appendChild(document.createTextNode(dest.howToArrive));
    hdr.appendChild(arriveDiv);
  }

  // Presupuesto
  if (dest.budget) hdr.appendChild(txt(mkdiv('dest-budget'),'\uD83D\uDCB0 '+dest.budget));

  // Botones del destino: Amap + Fotos
  var destBtns = mkdiv('dest-action-btns');
  if (dest.amapQuery) {
    var amapBtn = mk('button','dest-btn amap-btn');
    amapBtn.textContent = '\uD83D\uDDFA\uFE0F Ver en Amap';
    (function(q){ amapBtn.onclick = function(){ openAmap(q); }; })(dest.amapQuery);
    destBtns.appendChild(amapBtn);
  }
  if (dest.photosQuery) {
    var photoBtn = mk('button','dest-btn photo-btn');
    photoBtn.textContent = '\uD83D\uDCF8 Ver fotos';
    (function(q){ photoBtn.onclick = function(){ openPhotos(q); }; })(dest.photosQuery);
    destBtns.appendChild(photoBtn);
  }
  hdr.appendChild(destBtns);
  frag.appendChild(hdr);

  (dest.alerts||[]).forEach(function(a){ frag.appendChild(txt(mkdiv('alert-box'),'⚠ '+a)); });
  dest.days.forEach(function(day,dyi){ frag.appendChild(buildDay(day,di,dyi)); });
  return frag;
}

function buildFood(dest) {
  var frag = document.createDocumentFragment();
  (dest.gastronomy||[]).forEach(function(f){
    var card = mkdiv('food-card');
    var h4 = mk('h4'); h4.textContent = (f.icon||'♨')+' '+f.name;
    var p = mk('p'); p.textContent = f.desc;
    card.appendChild(h4); card.appendChild(p);
    if(f.price) card.appendChild(txt(mkdiv('food-price'),'¥ '+f.price));
    if(f.where) card.appendChild(txt(mkdiv('food-where'),'📍 '+f.where));
    frag.appendChild(card);
  });
  return frag;
}

function buildGlossary(dest) {
  var frag = document.createDocumentFragment();
  GLOBAL_GLOSS.concat(dest.glossary||[]).forEach(function(g){
    var e = mkdiv('gloss-entry');
    e.appendChild(txt(mkdiv('gloss-cn'),g.cn));
    var info = mkdiv('');
    info.appendChild(txt(mkdiv('gloss-pin'),g.pin));
    info.appendChild(txt(mkdiv('gloss-es'),g.es));
    info.appendChild(txt(mkdiv('gloss-pro'),'Pron: '+g.pro));
    e.appendChild(info); frag.appendChild(e);
  });
  return frag;
}

function buildMore(dest) {
  var frag = document.createDocumentFragment();
  var cv = mkdiv('tool-card');
  cv.innerHTML = '<h4>\uD83D\uDCB1 Conversor EUR \u2194 CNY</h4>'

  frag.appendChild(cv);
  var em = mkdiv('tool-card');
  em.appendChild(txt(mk('h4'),'\uD83C\uDDE6\uD83C\uDDF8 Emergencias'));
  [['tel:110','\uD83D\uDC6E','Policia China','110'],
   ['tel:120','\uD83D\uDE91','Ambulancia','120'],
   ['tel:+861065323629','\uD83C\uDDE8\uD83C\uDDF3','Embajada Espana Beijing','+86 10 6532 3629']
  ].forEach(function(e){
    var a=mk('a','emerg-btn'); a.href=e[0];

    inf.appendChild(txt(mkdiv('e-name'),e[2]));

    a.appendChild(ic); a.appendChild(inf); a.appendChild(call); em.appendChild(a);

  bg.appendChild(txt(mk('h4'),'\uD83D\uDCB0 Presupuesto '+dest.name));
  (dest.dailyBudget||[]).forEach(function(r){

    row.appendChild(txt(mkdiv('b-cat'),r.cat));

    +'\uD83D\uDE97 <b style="color:var(--text)">DiDi</b> — Taxi<br>'
    +'\uD83D\uDCAC <b style="color:var(--text)">WeChat</b> — Pagos<br>'
    +'\uD83C\uDF9F <b style="color:var(--text)">Trip.com</b> — Reservas<br>'
    +'\uD83D\uDE82 <b style="color:var(--text)">12306</b> — Trenes<br>'
    +'\uD83C\uDF10 <b style="color:var(--text)">VPN</b> — Activar ANTES de entrar</div>';
  frag.appendChild(ap);
  return frag;
}

function buildNav() {
  var nav = document.getElementById('nav'); nav.innerHTML='';
  DESTINATIONS.forEach(function(d,i){
    var item=mkdiv('nav-dest'+(i===currentDest?' active':''));
    item.onclick=(function(idx){ return function(){ loadDest(idx); }; })(i);
    var flag=mk('span'); flag.style.fontSize='18px'; flag.textContent=d.flagEmoji;
    var info=mkdiv('');
    info.appendChild(txt(mkdiv('dest-name'),d.name));
    info.appendChild(txt(mkdiv('dest-dates'),d.dates));
    item.appendChild(flag); item.appendChild(info); nav.appendChild(item);
  });
}

function loadDest(idx) {
  currentDest=idx;
  var items=document.querySelectorAll('.nav-dest');
  for(var i=0;i<items.length;i++) items[i].classList.toggle('active',i===idx);
  document.getElementById('topbar-title').textContent=DESTINATIONS[idx].flagEmoji+' '+DESTINATIONS[idx].name;
  renderCurrentTab(); updateProgress();
  if(window.innerWidth<=600) document.getElementById('sidebar').classList.remove('open');
}

function renderCurrentTab() {
  var dest=DESTINATIONS[currentDest];
  var content=document.getElementById('content');
  content.innerHTML='';
  var frag;
  if(currentTab==='itinerary') frag=buildItinerary(dest,currentDest);
  else if(currentTab==='food') frag=buildFood(dest);
  else if(currentTab==='glossary') frag=buildGlossary(dest);
  else frag=buildMore(dest);
  content.appendChild(frag); content.scrollTop=0;
}

function switchTab(tab,btn) {
  currentTab=tab;
  var btns=document.querySelectorAll('.tab-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  btn.classList.add('active'); renderCurrentTab();
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

function convertEUR() {
  var v=parseFloat(document.getElementById('eur-in').value)||0;
  document.getElementById('cny-out').textContent='= '+(v*7.8).toFixed(1)+' CNY';
}
function convertCNY() {
  var v=parseFloat(document.getElementById('cny-in').value)||0;
  document.getElementById('eur-out').textContent='= '+(v/7.8).toFixed(2)+' EUR';
}

buildNav();
loadDest(0);
 
</script>
</body>
</html>
